services:
  vpn:
    image: qmcgaw/gluetun
    container_name: echelon-vpn
    cap_add: [NET_ADMIN]
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=KG1iYuhWobnTlLIFmtZP+sQbj2qUudiK5XXrR2sX92Q=
      - SERVER_COUNTRIES=Netherlands
      - FREE_ONLY=false
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - FIREWALL_OUTBOUND_SUBNETS=192.168.0.0/24
      - DNS_UPSTREAM_RESOLVERS=1.1.1.1
      - BLOCK_MALICIOUS=on
      - BLOCK_SURVEILLANCE=on
      - BLOCK_ADS=on
      - HTTP_CONTROL_SERVER_LOG=off
    ports:
      - "6891:6891"
      - "9090:9090"
    volumes:
      - ./data/gluetun:/gluetun
      - gluetun-tmp:/tmp/gluetun
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: echelon-qbit-scanner
    network_mode: service:vpn
    environment:
      - PUID=568
      - PGID=568
      - TZ=America/New_York
      - WEBUI_PORT=6891
      - TORRENTING_PORT=46213
    volumes:
      - ./data/qbit:/config
      - /mnt/Media/MediaServer:/media:ro
      - ./data/torrents:/torrents
      - ./data/gluetun:/gluetun:ro
    restart: unless-stopped
    depends_on:
      vpn:
        condition: service_healthy

  scanner:
    image: ghcr.io/k13094/echelon-scanner:latest
    container_name: echelon-scanner
    network_mode: service:vpn
    environment:
      - TRACKER_URL=https://echelonhd.me
      - TRACKER_PASSKEY=4c0f5b47a59b525df996827fd15b09ce
      - TMDB_API_KEY=93889655f8028098b115e8aa5e3f4414
      - QBIT_URL=http://localhost:6891
      - QBIT_USER=admin
      - QBIT_PASS=Lol1234
      - TRACKER_API_ENDPOINT=https://echelonhd.me/upload-manager.php?action=scanner_register
      - TRACKER_API_PASSWORD=EchelonHD20261234!!
      - SCAN_INTERVAL=0
      - DB_PATH=/data/scanner.db
    volumes:
      - /mnt/Media/MediaServer:/media:ro
      - ./data/torrents:/torrents
      - ./data:/data
      - gluetun-tmp:/gluetun-tmp:ro
    restart: unless-stopped
    depends_on:
      - vpn
      - qbittorrent

volumes:
  gluetun-tmp:
