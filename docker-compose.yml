services:
  vpn:
    image: qmcgaw/gluetun
    container_name: echelon-vpn
    cap_add: [NET_ADMIN]
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=kPhaonQwPpKHGtq0+pmp
      - OPENVPN_PASSWORD=67yrgjulOK3GVlZtsbVcINVPdIlgGTV8
      - SERVER_COUNTRIES=Netherlands
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - FIREWALL_OUTBOUND_SUBNETS=192.168.0.0/24
      - DOT=on
      - DOT_PROVIDERS=cloudflare
      - BLOCK_MALICIOUS=on
      - BLOCK_SURVEILLANCE=on
      - BLOCK_ADS=on
    ports:
      - "6891:6891"
      - "9090:9090"
    volumes:
      - ./data/gluetun:/gluetun
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: echelon-qbit-scanner
    network_mode: service:vpn
    environment:
      - PUID=568
      - PGID=568
      - TZ=America/New_York
      - WEBUI_PORT=6891
      - TORRENTING_PORT=46213
    volumes:
      - ./data/qbit:/config
      - /mnt/Media/MediaServer:/media:ro
      - ./data/torrents:/torrents
      - ./data/gluetun:/gluetun:ro
    restart: unless-stopped
    depends_on:
      vpn:
        condition: service_healthy

  port-sync:
    image: alpine:latest
    container_name: echelon-port-sync
    network_mode: service:vpn
    volumes:
      - ./data/gluetun:/gluetun:ro
    environment:
      - QBIT_URL=http://localhost:6891
      - QBIT_USER=admin
      - QBIT_PASS=Lol1234
    entrypoint: /bin/sh
    command: >
      -c "apk add --no-cache curl > /dev/null 2>&1;
      CURRENT_PORT='';
      while true; do
        if [ -f /gluetun/forwarded_port ]; then
          NEW_PORT=$$(cat /gluetun/forwarded_port | tr -d '[:space:]');
          if [ -n \"$$NEW_PORT\" ] && [ \"$$NEW_PORT\" != \"$$CURRENT_PORT\" ]; then
            sleep 10;
            curl -s -c /tmp/c -b /tmp/c \"$$QBIT_URL/api/v2/auth/login\" -d \"username=$$QBIT_USER&password=$$QBIT_PASS\" > /dev/null 2>&1;
            curl -s -b /tmp/c \"$$QBIT_URL/api/v2/app/setPreferences\" -d \"json={\\\"listen_port\\\":$$NEW_PORT}\" > /dev/null 2>&1;
            CURRENT_PORT=$$NEW_PORT;
            echo \"[port-sync] qBit listening port set to $$NEW_PORT\";
          fi;
        fi;
        sleep 30;
      done"
    restart: unless-stopped
    depends_on:
      - vpn
      - qbittorrent

  scanner:
    image: ghcr.io/k13094/echelon-scanner:latest
    container_name: echelon-scanner
    network_mode: service:vpn
    environment:
      - TRACKER_URL=https://echelonhd.me
      - TRACKER_PASSKEY=4c0f5b47a59b525df996827fd15b09ce
      - TMDB_API_KEY=93889655f8028098b115e8aa5e3f4414
      - QBIT_URL=http://localhost:6891
      - QBIT_USER=admin
      - QBIT_PASS=Lol1234
      - TRACKER_API_ENDPOINT=https://echelonhd.me/upload-manager.php?action=scanner_register
      - TRACKER_API_PASSWORD=EchelonHD20261234!!
      - SCAN_INTERVAL=0
      - DB_PATH=/data/scanner.db
    volumes:
      - /mnt/Media/MediaServer:/media:ro
      - ./data/torrents:/torrents
      - ./data:/data
    restart: unless-stopped
    depends_on:
      - vpn
      - qbittorrent
